name: PHP Lint & Static Analysis

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  php-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP (with PHPStan)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: phpstan  # installs PHPStan globally on the runner

      - name: Lint PHP files (syntax only)
        run: |
          set -e
          find . -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run PHPStan (level 1)
        run: |
          phpstan analyse . \
            --level=1 \
            --memory-limit=512M \
            --error-format=github
        # level=1 is the loosest level; increase for stricter checks